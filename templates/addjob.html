<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>

    <style>
        body{
            margin:0;
            font-family:Segoe UI;
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .form-container{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#667eea;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="form-container">

<h2>Add Job</h2>

<form method="POST">

<input type="text" name="title" placeholder="Job Title" required>

<input type="text" name="company" placeholder="Company Name" required>

<input type="text" name="location" placeholder="Location" required>

<button type="submit">Add Job</button>

</form>

</div>

</body>
</html>
